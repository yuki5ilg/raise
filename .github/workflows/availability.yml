name: Update gym availability

# 体育館の空き状況を定期取得して data/availability.json を更新・コミットする。
#
# 定期実行は外部の cron-job.org が workflow_dispatch API を10分ごとに叩いて起動する。
# GitHub内蔵の schedule は遅延・重複の原因になるため使わない（二重起動を避ける）。
on:
  workflow_dispatch:        # 外部cron(10分ごと)＆手動実行の起動口
    inputs:
      test_notify:
        description: "LINE接続テスト送信（友だち全員に検証メッセージを1通送る）"
        type: boolean
        default: false
  push:                     # スクレイパー/ワークフロー変更時に即検証実行
    branches: [main]
    paths:
      - "scripts/scrape_availability.py"
      - ".github/workflows/availability.yml"

permissions:
  contents: write

concurrency:
  group: availability
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Scrape availability
        run: python scripts/scrape_availability.py

      - name: Notify on new 21-23 availability (LINE)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
        run: python scripts/notify_availability.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/availability.json data/notify_state_2123.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: 体育館の空き状況を更新 [skip ci]"
            git push
          else
            echo "変更なし"
          fi
