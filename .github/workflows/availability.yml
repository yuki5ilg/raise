name: Update gym availability

# 体育館の空き状況を定期取得して data/availability.json を更新・コミットする。
on:
  schedule:
    - cron: "0 21,3,9 * * *"   # UTC。JST 06:00 / 12:00 / 18:00 の1日3回
  workflow_dispatch:            # 手動実行も可

permissions:
  contents: write

concurrency:
  group: availability
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Scrape availability
        run: python scripts/scrape_availability.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/availability.json; then
            git add data/availability.json
            git commit -m "chore: 体育館の空き状況を更新 [skip ci]"
            git push
          else
            echo "変更なし"
          fi
