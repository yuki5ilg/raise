<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>raise｜ログイン合言葉ジェネレーター（オフライン）</title>
<style>
  body { font-family: system-ui, "Noto Sans JP", sans-serif; background: #f5ecdc; color: #322b22; margin: 0; padding: 28px; line-height: 1.7; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; }
  .card { background: #fffdf8; border: 1px solid rgba(60,45,25,.14); border-radius: 14px; padding: 22px; margin-top: 18px; box-shadow: 0 10px 30px rgba(80,55,25,.08); }
  label { font-weight: 700; font-size: 14px; display: block; margin-bottom: 6px; }
  input, textarea { width: 100%; box-sizing: border-box; font-family: ui-monospace, monospace; font-size: 14px; padding: 12px; border: 1px solid rgba(60,45,25,.2); border-radius: 10px; background: #fff; }
  textarea { min-height: 120px; margin-top: 8px; }
  button { margin-top: 14px; background: linear-gradient(120deg,#c2622e,#d99a4e); color: #fff; border: none; border-radius: 999px; padding: 12px 28px; font-weight: 700; font-size: 15px; cursor: pointer; }
  .note { font-size: 13px; color: #87796a; }
  code { background: #efe4d1; padding: 1px 6px; border-radius: 4px; }
  .ok { color: #3f9b6b; font-weight: 700; }
  .err { color: #c0563f; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔑 ログイン合言葉ジェネレーター</h1>
  <p class="note">
    このページは<strong>完全にオフラインで動作</strong>します（通信しません）。新しい合言葉を入力すると、
    平文を含まない「検証ハッシュ」を生成します。<br />
    出力を <code>script.js</code> 冒頭の <code>PASS_VERIFIER = { ... }</code> に貼り替えてください。
  </p>

  <div class="card">
    <label for="pass">新しい合言葉（強いものを推奨）</label>
    <input id="pass" type="text" placeholder="例: Raise-Badminton-2026!" />
    <button id="go">検証ハッシュを生成</button>
    <p id="status"></p>
    <label for="result" id="resultLabel" style="display:none;margin-top:10px;">↓ これを script.js の PASS_VERIFIER に貼り替え</label>
    <textarea id="result" style="display:none;" readonly></textarea>
    <button id="copy" style="display:none;">コピー</button>
  </div>

  <p class="note" style="margin-top:18px;">
    ※ 合言葉そのものはどこにも保存されません（忘れると入れなくなります）。<br />
    ※ パラメータ: PBKDF2-SHA256（200,000回）。<code>script.js</code> の <code>verifyPasscode</code> と一致しています。<br />
    ※ 合言葉を変えたら、ログイン画面の「ヒント」文言（index.html）も必要に応じて更新してください。
  </p>
</div>

<script>
const $ = (id) => document.getElementById(id);
const b64 = (u8) => { let s=""; new Uint8Array(u8).forEach(b=>s+=String.fromCharCode(b)); return btoa(s); };
$("go").addEventListener("click", async () => {
  const status = $("status");
  const password = $("pass").value.trim();
  if (!password) { status.innerHTML = '<span class="err">合言葉を入力してください。</span>'; return; }
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iterations = 200000;
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, km, 256);
  const out = "const PASS_VERIFIER = {\n" +
    '  salt: "' + b64(salt) + '",\n' +
    "  iterations: " + iterations + ",\n" +
    '  hash: "' + b64(bits) + '",\n' +
    "};";
  $("result").value = out;
  $("result").style.display = "block";
  $("resultLabel").style.display = "block";
  $("copy").style.display = "inline-block";
  status.innerHTML = '<span class="ok">生成しました。下のコードを script.js に貼り替えてください。</span>';
});
$("copy").addEventListener("click", () => { $("result").select(); document.execCommand("copy"); });
</script>
</body>
</html>
